apiVersion: v1
kind: Service
metada:
  name: nginx-lb
  # Service Labels
  labels:
    project: roboshop
    environment: dev
  spec:
    type: LoadBalancer
    # Service uses the below labels to select the pods
    selector:
      project: roboshop
      tier: frontend
      component: frontend
    ports:
      - protocol: TCP
        port: 80 # Service Port
        targetPort: 80 # Container Port
        nodePort: 30008