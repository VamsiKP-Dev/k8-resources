apiVersion: v1
kind: Service
metadata:
  name: nginx-np
  # Service labels
  labels:
    project: roboshop
    environment: dev
spec:
  type: NodePort
  # Service uses the below labels to select the pods
  selector:
    project: roboshop
    tier: frontend
    component: frontend
  ports:
    - protocol: TCP
      port: 80 # Service Port
      targetPort: 80 # Container Port
      nodePort: 3007